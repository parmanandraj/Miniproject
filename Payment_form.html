<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment form</title>
    <style>
      h1 {
        background-color: rgb(89, 0, 255);
        color: rgb(0, 255, 140);
      }
    </style>
  </head>

  <body>
    <form action="">
      <h1 align="center"><u>Payment form</u></h1>
      <h2>Contact Information</h2>
      <p>
        Name :-
        <input type="text" name="name" placeholder="Enter your name" required />
      </p>
      <fieldset>
        <legand>Gender</legand>
        <p>
          Male <input type="radio" name="gender" id="male" /> Female
          <input type="radio" name="gender" id="female" />
        </p>
      </fieldset>
      <p>
        Address :-
        <textarea name="address" id="address" cols="100" rows="8"></textarea>
      </p>
      <lable>Phone number :-</lable>
      <input
        type="text"
        Phone
        number="Phone number"
        placeholder="Enter your phone number"
        <br
      />
      <p>
        Email :-
        <input
          type="email"
          name="email"
          id="email"
          placeholder="Enter your Email"
        />
      </p>
      <p>
        Pincode :-
        <input
          type="nnumber"
          name="pincode"
          id="pincode"
          placeholder="Enter pin number"
        />
      </p>
      <h2>Contact Information</h2>
      <p>
        Card type :-
        <select name="card type" id="card_type">
          <option value="">--select a card Type--</option>
          <option value="visa">Visa</option>
          <option value="rupay">Rupay</option>
          <option value="mastercard">Maastercard</option>
        </select>
      </p>

      <p>
        Expiratin Date :- <input type="date" name="exp_date" id="exp_date" />
      </p>
      <p>
        CVV
        <input
          type="password"
          name="cvv"
          id="cvv"
          placeholder="Enter the cvv"
        />
      </p>
      <input type="submit" value="Pay Now" />
      <input type="reset" value="Reset" />
    </form>
  </body>
</html>
